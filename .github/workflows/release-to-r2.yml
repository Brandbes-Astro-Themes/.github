name: Theme Release (Reusable)

# ─────────────────────────────────────────────────────────────────────────────
# Reusable workflow — called by each theme repo.
# Triggers: tag push (e.g. 1.0.1) or manual workflow_dispatch.
# Org-level secrets required (set once in GitHub org Settings → Secrets):
#   R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT_URL, R2_BUCKET_NAME
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      slug:
        description: "Theme slug — used as the zip filename prefix (e.g. 'artimg')"
        required: true
        type: string
    secrets:
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true
      R2_ENDPOINT_URL:
        required: true
      R2_BUCKET_NAME:
        required: true

jobs:
  release:
    name: Zip & Upload "${{ inputs.slug }}" to R2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Resolve version ────────────────────────────────────────────────────
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "📌 Tag release: ${{ github.ref_name }}"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "value=$VERSION" >> $GITHUB_OUTPUT
            echo "⚡ Manual release: $VERSION"
          fi

      # ── Create zip ─────────────────────────────────────────────────────────
      - name: Create theme zip
        run: |
          SLUG="${{ inputs.slug }}"
          VERSION="${{ steps.version.outputs.value }}"
          ZIP_NAME="${SLUG}-${VERSION}.zip"

          echo "📦 Zipping $SLUG @ $VERSION → $ZIP_NAME"

          zip -r "$ZIP_NAME" . \
            --exclude "*.git*" \
            --exclude "*node_modules*" \
            --exclude "*dist/*" \
            --exclude "*/.DS_Store" \
            --exclude "*.env*" \
            --exclude "*/.github/*" \
            --exclude "*/RELEASE.md"

          echo "zip_name=$ZIP_NAME" >> $GITHUB_ENV
          echo "✅ $(du -sh $ZIP_NAME | cut -f1)"

      # ── Upload to R2 ───────────────────────────────────────────────────────
      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          SLUG="${{ inputs.slug }}"
          VERSION="${{ steps.version.outputs.value }}"
          ZIP_NAME="${SLUG}-${VERSION}.zip"
          BUCKET="${{ secrets.R2_BUCKET_NAME }}"
          ENDPOINT="${{ secrets.R2_ENDPOINT_URL }}"

          echo "🚀 Uploading $ZIP_NAME to R2..."

          aws s3 cp "$ZIP_NAME" "s3://${BUCKET}/${ZIP_NAME}" \
            --endpoint-url "$ENDPOINT" \
            --no-progress

          echo ""
          echo "✅ Upload complete: ${BUCKET}/${ZIP_NAME}"
