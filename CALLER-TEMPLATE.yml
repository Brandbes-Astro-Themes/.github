# ─────────────────────────────────────────────────────────────────────────────
# Copy this file into each theme repo at:
#   .github/workflows/release-to-r2.yml
#
# Then change the ONE line:  slug: YOUR-THEME-SLUG
# That's it — the rest is handled by the org-level reusable workflow.
# ─────────────────────────────────────────────────────────────────────────────

name: Release to Cloudflare R2

on:
  push:
    branches: [main]
    tags: ["*.*.*"]

jobs:
  release:
    uses: Brandbes-Astro-Themes/.github/.github/workflows/theme-release.yml@main
    with:
      slug: YOUR-THEME-SLUG   # ← change this only
    secrets: inherit
